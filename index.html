<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EU AI Act Assistant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="overlay">
<div class="center">
<h1>EU AI Act Assistant</h1>
<div class="search">
<input id="question" placeholder="Ask any question about EU AI Act">
<button onclick="ask()">Search</button>
</div>
</div>
<div id="answer"></div>
</div>
<script>
const API="https://eu-ai-act-search-api.aipath512.workers.dev/search?q=";
async function ask(){
const box=document.getElementById("answer");
box.innerText="Analysing evidence...";
const r=await fetch(API+encodeURIComponent(document.getElementById("question").value));
const d=await r.json();
box.innerText=d.answer || "No answer";
}
</script>
</body>
</html>
